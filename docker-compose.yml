services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    container_name: lib_app
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    networks:
      - lib_net

  nginx:
    image: nginx:1.26-alpine
    container_name: lib_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lib_net

  frontend:
    image: node:20-alpine
    container_name: lib_frontend
    working_dir: /var/www/html/frontend
    volumes:
      - ./frontend:/var/www/html/frontend:cached
      - /var/www/html/frontend/node_modules
    ports:
      - "5173:5173"
      - "24678:24678"  # Vite HMR
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    command: sh -c "npm install && npm run dev"
    networks:
      - lib_net

networks:
  lib_net:
    driver: bridge