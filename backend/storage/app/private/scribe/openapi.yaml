  /api/books:
    get:
      summary: ''
      operationId: getApiBooks
      description: ''
      parameters: []
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Ошибка валидации параметров'
                  errors:
                    search:
                      - 'The search field must be at least 2 characters.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Ошибка валидации параметров'
                  errors:
                    type: object
                    properties:
                      search:
                        type: array
                        example:
                          - 'The search field must be at least 2 characters.'
                        items:
                          type: string
      tags:
        - Endpoints
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 16
                per_page:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 100.'
                  example: 22
                search:
                  type: string
                  description: 'Must be at least 2 characters. Must not be greater than 100 characters.'
                  example: g
                genre_id:
                  type: integer
                  description: 'The <code>genre_id</code> of an existing record in the genres table.'
                  example: 16
                author_id:
                  type: integer
                  description: 'The <code>author_id</code> of an existing record in the authors table.'
                  example: 16
