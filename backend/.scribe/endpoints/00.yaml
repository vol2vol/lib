        content: '{"format_id":1,"format_name":"PDF","created_at":"2026-03-17T11:55:34.000000Z","updated_at":"2026-03-17T11:55:34.000000Z","books":[{"book_id":4,"book_title":"\u041b\u0430\u0440\u0435\u0446 \u041c\u0430\u0440\u0438\u0438 \u041c\u0435\u0434\u0438\u0447\u0438","description":"\u0412 \u0436\u0438\u0437\u043d\u044c \u043c\u043e\u043b\u043e\u0434\u044b\u0445 \u043b\u044e\u0434\u0435\u0439 \u0432\u043e\u0448\u043b\u0430 \u0434\u0440\u0435\u0432\u043d\u044f\u044f \u0442\u0430\u0439\u043d\u0430 \u2014 \u043b\u0430\u0440\u0435\u0446 \u041c\u0430\u0440\u0438\u0438 \u041c\u0435\u0434\u0438\u0447\u0438 \u0438 \u0441\u0435\u043c\u044c \u0435\u0433\u043e \u0437\u0430\u0433\u0430\u0434\u043e\u0447\u043d\u044b\u0445 \u00ab\u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432\u00bb. \u0421\u0438\u043b\u043e\u044e \u043e\u0431\u0441\u0442\u043e\u044f\u0442\u0435\u043b\u044c\u0441\u0442\u0432 \u0447\u0443\u0434\u0435\u0441\u043d\u0430\u044f \u0440\u0435\u043b\u0438\u043a\u0432\u0438\u044f \u043f\u043e\u043f\u0430\u0434\u0430\u0435\u0442 \u0432 \u0442\u0435\u0441\u043d\u0443\u044e \u043a\u043e\u043c\u043d\u0430\u0442\u0443 \u0432 \u043c\u0430\u043b\u0435\u043d\u044c\u043a\u043e\u043c \u043c\u043e\u0441\u043a\u043e\u0432\u0441\u043a\u043e\u043c \u043f\u0435\u0440\u0435\u0443\u043b\u043a\u0435, \u0441 \u044d\u0442\u043e\u0433\u043e, \u0441\u043e\u0431\u0441\u0442\u0432\u0435\u043d\u043d\u043e, \u0438 \u043d\u0430\u0447\u0438\u043d\u0430\u0435\u0442\u0441\u044f \u0446\u0435\u043f\u044c \u0443\u0434\u0438\u0432\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0445 \u043f\u0440\u043e\u0438\u0441\u0448\u0435\u0441\u0442\u0432\u0438\u0439, \u043e\u0434\u043d\u0438\u043c \u0438\u0437 \u0437\u0432\u0435\u043d\u044c\u0435\u0432 \u043a\u043e\u0442\u043e\u0440\u043e\u0439 \u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0438\u0441\u0447\u0435\u0437\u043d\u043e\u0432\u0435\u043d\u0438\u0435 \u0438\u043d\u043e\u0441\u0442\u0440\u0430\u043d\u043d\u043e\u0433\u043e \u0442\u0443\u0440\u0438\u0441\u0442\u0430.","published_year":1972,"publisher_id":4,"created_at":"2026-03-17T11:55:37.000000Z","updated_at":"2026-03-17T11:55:37.000000Z","cover_path":"covers\/4.jpg","pivot":{"format_id":1,"book_id":4}},{"book_id":5,"book_title":"\u042d\u043d\u0446\u0438\u043a\u043b\u043e\u043f\u0435\u0434\u0438\u044f \u043d\u0430\u0447\u0438\u043d\u0430\u044e\u0449\u0435\u0433\u043e \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u0438\u0441\u0442\u0430","description":"\u0427\u0443\u0442\u044c \u0431\u043e\u043b\u0435\u0435 \u0441\u0442\u0430 \u043b\u0435\u0442 \u043d\u0430\u0437\u0430\u0434 \u0438\u0437\u043e\u0431\u0440\u0435\u0442\u0430\u0442\u0435\u043b\u0438 \u0432\u044b\u043f\u0443\u0441\u0442\u0438\u043b\u0438 \u0438\u0437 \u0431\u0443\u0442\u044b\u043b\u043a\u0438 \u0434\u0436\u0438\u043d\u043d\u0430, \u0438\u043c\u044f \u043a\u043e\u0442\u043e\u0440\u043e\u043c\u0443 \u2014 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044c. \u0421 \u043d\u0435\u0432\u0435\u0440\u043e\u044f\u0442\u043d\u043e\u0439 \u0431\u044b\u0441\u0442\u0440\u043e\u0442\u043e\u0439 \u0440\u0430\u0441\u0441\u0435\u043b\u0438\u043b\u0438\u0441\u044c \u0435\u0433\u043e \u043f\u043e\u0442\u043e\u043c\u043a\u0438 \u043f\u043e \u0432\u0441\u0435\u043c\u0443 \u043c\u0438\u0440\u0443. \u0410\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044c \u0441\u0442\u0430\u043b \u0441\u0430\u043c\u043e\u0439 \u043b\u044e\u0431\u0438\u043c\u043e\u0439, \u043f\u043e\u0441\u043b\u0443\u0448\u043d\u043e\u0439 \u0438 \u0431\u043b\u0438\u0437\u043a\u043e\u0439 \u043a \u0447\u0435\u043b\u043e\u0432\u0435\u043a\u0443 \u043c\u0430\u0448\u0438\u043d\u043e\u0439. \u0418 \u0438\u043d\u0442\u0435\u0440\u0435\u0441 \u043a \u043d\u0435\u043c\u0443 \u043d\u0435 \u0443\u0433\u0430\u0441\u0430\u0435\u0442. \u041f\u043e\u0441\u043c\u043e\u0442\u0440\u0438\u0442\u0435, \u0441\u043a\u043e\u043b\u044c\u043a\u043e \u043b\u044e\u0434\u0435\u0439 \u043e\u0431\u0441\u0442\u0443\u043f\u0430\u0435\u0442 \u0432\u0441\u044f\u043a\u0438\u0439 \u0440\u0430\u0437 \u043d\u043e\u0432\u0443\u044e, \u043d\u0435\u0437\u043d\u0430\u043a\u043e\u043c\u0443\u044e \u043c\u0430\u0440\u043a\u0443. \u041e\u043d \u0441\u0442\u0430\u043b \u0432\u043e \u043c\u043d\u043e\u0433\u0438\u0445 \u0441\u0435\u043c\u044c\u044f\u0445 \u043f\u0440\u0438\u0432\u044b\u0447\u043d\u044b\u043c \u043f\u0440\u0435\u0434\u043c\u0435\u0442\u043e\u043c \u0431\u044b\u0442\u0430. \u0414\u0430\u0436\u0435 \u043d\u0435 \u0432\u0435\u0440\u0438\u0442\u0441\u044f, \u0447\u0442\u043e \u0431\u044b\u043b\u043e \u0432\u0440\u0435\u043c\u044f, \u043a\u043e\u0433\u0434\u0430 \u043b\u044e\u0434\u0438 \u043e\u0431\u0445\u043e\u0434\u0438\u043b\u0438\u0441\u044c \u0431\u0435\u0437 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044f. \u041f\u0435\u0440\u0432\u044b\u0435 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u0438 \u043c\u043d\u043e\u0433\u0438\u043c\u0438 \u0432\u043e\u0441\u043f\u0440\u0438\u043d\u0438\u043c\u0430\u043b\u0438\u0441\u044c \u043a\u0430\u043a \u043f\u0440\u043e\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u043d\u0435\u0447\u0438\u0441\u0442\u043e\u0439 \u0441\u0438\u043b\u044b, \u0434\u044c\u044f\u0432\u043e\u043b\u044c\u0449\u0438\u043d\u044b \u0438\u043b\u0438 \u0438\u0433\u0440\u0443\u0448\u043a\u0438 \u0434\u043b\u044f \u0432\u0437\u0440\u043e\u0441\u043b\u044b\u0445. \u0418 \u0442\u0435\u043c \u043d\u0435 \u043c\u0435\u043d\u0435\u0435 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044c \u0443\u0431\u0435\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u043e \u0434\u043e\u043a\u0430\u0437\u0430\u043b \u0441\u0432\u043e\u044e \u043f\u0440\u0438\u0433\u043e\u0434\u043d\u043e\u0441\u0442\u044c \u0441\u043b\u0443\u0436\u0438\u0442\u044c \u043b\u044e\u0434\u044f\u043c. \u0421\u0435\u0439\u0447\u0430\u0441 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044c \u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0435\u0434\u0438\u043d\u044b\u043c \u0438 \u043d\u0435\u0434\u0435\u043b\u0438\u043c\u044b\u043c, \u043f\u043e\u0447\u0442\u0438 \u0436\u0438\u0432\u044b\u043c \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u043c\u043e\u043c. \u0422\u043e\u043b\u044c\u043a\u043e \u043f\u0440\u0438 \u043f\u043e\u043b\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u043e\u0441\u043f\u043e\u0441\u043e\u0431\u043d\u043e\u0441\u0442\u0438 \u0432\u0441\u0435\u0445 \u0435\u0433\u043e \u0441\u043e\u0441\u0442\u0430\u0432\u043b\u044f\u044e\u0449\u0438\u0445 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044c \u043c\u043e\u0436\u0435\u0442 \u0432\u044b\u043f\u043e\u043b\u043d\u044f\u0442\u044c \u0442\u0435 \u0444\u0443\u043d\u043a\u0446\u0438\u0438, \u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u0432\u043e\u0437\u043b\u0430\u0433\u0430\u0435\u0442 \u043d\u0430 \u043d\u0435\u0433\u043e \u0445\u043e\u0437\u044f\u0438\u043d. \u0421 \u043f\u043e\u043c\u043e\u0449\u044c\u044e \u044d\u0442\u043e\u0439 \u043a\u043d\u0438\u0433\u0438 \u0432\u044b \u043f\u043e\u0441\u0442\u0438\u0433\u043d\u0435\u0442\u0435 \u0430\u0437\u044b \u0432\u043e\u0436\u0434\u0435\u043d\u0438\u044f, \u0443\u0437\u043d\u0430\u0435\u0442\u0435, \u043a\u0430\u043a \u0441\u0434\u0430\u0442\u044c \u044d\u043a\u0437\u0430\u043c\u0435\u043d \u0432 \u0413\u0418\u0411\u0414\u0414, \u0440\u0430\u0437\u0431\u0435\u0440\u0435\u0442\u0435\u0441\u044c \u0432 \u0443\u0441\u0442\u0440\u043e\u0439\u0441\u0442\u0432\u0435 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044f. \u041e\u043d\u0430 \u0431\u0443\u0434\u0435\u0442 \u043f\u043e\u043b\u0435\u0437\u043d\u0430 \u0438 \u043f\u0440\u0438 \u043f\u043e\u043a\u0443\u043f\u043a\u0435 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u044f, \u0438 \u043f\u0440\u0438 \u0435\u0433\u043e \u043f\u0440\u043e\u0434\u0430\u0436\u0435. \u0412 \u043a\u043d\u0438\u0433\u0435 \u0432\u044b \u043d\u0430\u0439\u0434\u0435\u0442\u0435 \u0440\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0430\u0446\u0438\u0438 \u043f\u043e \u0442\u043e\u043c\u0443, \u043a\u0430\u043a \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e \u0432\u0435\u0441\u0442\u0438 \u0441\u0435\u0431\u044f \u043d\u0430 \u0434\u043e\u0440\u043e\u0433\u0435 \u0432 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0430\u043b\u044c\u043d\u044b\u0445 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044f\u0445, \u0432 \u0442\u043e\u043c \u0447\u0438\u0441\u043b\u0435 \u0438 \u0414\u0422\u041f. \u0412\u044b \u0443\u0437\u043d\u0430\u0435\u0442\u0435 \u0432\u0441\u0435 \u043e \u0436\u0438\u0437\u043d\u0438 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u0438\u0441\u0442\u0430 \u0438 \u0443\u0445\u043e\u0434\u0435 \u0437\u0430 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0438\u043b\u0435\u043c.","published_year":2006,"publisher_id":5,"created_at":"2026-03-17T11:55:37.000000Z","updated_at":"2026-03-17T11:55:37.000000Z","cover_path":"covers\/5.jpg","pivot":{"format_id":1,"book_id":5}},{"book_id":7,"book_title":"C++ \u0434\u043b\u044f \"\u0447\u0430\u0439\u043d\u0438\u043a\u043e\u0432\"","description":"C++ \u0434\u043b\u044f \"\u0447\u0430\u0439\u043d\u0438\u043a\u043e\u0432\" 4-\u0435 \u0438\u0437\u0434\u0430\u043d\u0438\u0435. \"\u041c\u043e\u0438\u043c \u0434\u0440\u0443\u0437\u044c\u044f\u043c \u0438 \u0441\u0435\u043c\u044c\u0435, \u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u043f\u043e\u043c\u043e\u0433\u043b\u0438 \u043c\u043d\u0435 \u0441\u0442\u0430\u0442\u044c \"\u0447\u0430\u0439\u043d\u0438\u043a\u043e\u043c \" \u0432 \u0435\u0449\u0435 \u0431\u043e\u043b\u044c\u0448\u0435\u0439 \u0441\u0442\u0435\u043f\u0435\u043d\u0438, \u0447\u0435\u043c \u044f \u0435\u0441\u0442\u044c \u043d\u0430 \u0441\u0430\u043c\u043e\u043c \u0434\u0435\u043b\u0435\" (\u0421\u0442\u0435\u0444\u0430\u043d \u0420. \u0414\u044d\u0432\u0438\u0441). \u0421\u0442\u0435\u0444\u0430\u043d \u0420. \u0414\u044d\u0432\u0438\u0441 (Stephen R. Davis) \u2014 \u0430\u0432\u0442\u043e\u0440 \u043c\u043d\u043e\u0436\u0435\u0441\u0442\u0432\u0430 \u043a\u043d\u0438\u0433, \u0432\u043a\u043b\u044e\u0447\u0430\u044f \u0442\u0430\u043a\u0438\u0435 \u0431\u0435\u0441\u0442\u0441\u0435\u043b- \u043b\u0435\u0440\u044b, \u043a\u0430\u043a C++ \u0434\u043b\u044f \"\u0447\u0430\u0439\u043d\u0438\u043a\u043e\u0432 \", More C++for Dummies \u0438 Windows 95 Programming for Dummies. \u0421\u0442\u0435\u0444\u0430\u043d \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442 \u0432 \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u0438 Valtech, \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u0438\u0437\u0438\u0440\u0443\u044e\u0449\u0435\u0439\u0441\u044f \u0432 \u043e\u0431\u043b\u0430\u0441\u0442\u0438 \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u044f \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0442\u0438\u043a\u0435 (\u0414\u0430\u043b\u043b\u0430\u0441, \u0422\u0435\u0445\u0430\u0441). \u041a\u043d\u0438\u0433\u0430, \u043a\u043e\u0442\u043e\u0440\u0430\u044f \u0443 \u0432\u0430\u0441 \u0432 \u0440\u0443\u043a\u0430\u0445, - \u044d\u0442\u043e \u0432\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0432 \u044f\u0437\u044b\u043a \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f C++. \u041e\u043d\u0430 \u043d\u0430\u0447\u0438\u043d\u0430\u0435\u0442\u0441\u044f \u0441 \u0430\u0437\u043e\u0432: \u043e\u0442 \u0447\u0438\u0442\u0430\u0442\u0435\u043b\u044f \u043d\u0435 \u0442\u0440\u0435\u0431\u0443\u0435\u0442\u0441\u044f \u043a\u0430\u043a\u0438\u0445-\u043b\u0438\u0431\u043e \u0437\u043d\u0430\u043d\u0438\u0439 \u0432 \u043e\u0431\u043b\u0430\u0441\u0442\u0438 \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f. \u0412 \u043e\u0442\u043b\u0438\u0447\u0438\u0435 \u043e\u0442 \u0434\u0440\u0443\u0433\u0438\u0445 \u043a\u043d\u0438\u0433 \u043f\u043e \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e \u043d\u0430 C++, \u0432 \u044d\u0442\u043e\u0439 \u043a\u043d\u0438\u0433\u0435 \u0432\u043e\u043f\u0440\u043e\u0441 `\u043f\u043e\u0447\u0435\u043c\u0443` \u0441\u0447\u0438\u0442\u0430\u0435\u0442\u0441\u044f \u043d\u0435 \u043c\u0435\u043d\u0435\u0435 \u0432\u0430\u0436\u043d\u044b\u043c, \u0447\u0435\u043c \u0432\u043e\u043f\u0440\u043e\u0441 `\u043a\u0430\u043a`. \u0418 \u043f\u043e\u0442\u043e\u043c\u0443 \u043f\u0435\u0440\u0435\u0434 \u0438\u0437\u043b\u043e\u0436\u0435\u043d\u0438\u0435\u043c \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u044b\u0445 \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0435\u0439 \u044f\u0437\u044b\u043a\u0430 C++ \u0447\u0438\u0442\u0430\u0442\u0435\u043b\u044e \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u044f\u0435\u0442\u0441\u044f, \u043a\u0430\u043a \u043e\u043d\u0438 \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0442 \u0432 \u0446\u0435\u043b\u043e\u043c. \u0412\u0435\u0434\u044c \u043a\u0430\u0436\u0434\u0430\u044f \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u043d\u0430\u044f \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u044f\u0437\u044b\u043a\u0430 - \u044d\u0442\u043e \u043e\u0442\u0434\u0435\u043b\u044c\u043d\u044b\u0439 \u0448\u0442\u0440\u0438\u0445 \u0435\u0434\u0438\u043d\u043e\u0439 \u043a\u0430\u0440\u0442\u0438\u043d\u044b. \u041f\u0440\u043e\u0447\u0438\u0442\u0430\u0432 \u043a\u043d\u0438\u0433\u0443, \u0432\u044b \u0441\u043c\u043e\u0436\u0435\u0442\u0435 \u043d\u0430\u043f\u0438\u0441\u0430\u0442\u044c \u043d\u0430 C++ \u0432\u0440\u0430\u0437\u0443\u043c\u0438\u0442\u0435\u043b\u044c\u043d\u0443\u044e \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u0443 \u0438, \u0447\u0442\u043e \u043d\u0435 \u043c\u0435\u043d\u0435\u0435 \u0432\u0430\u0436\u043d\u043e, \u0431\u0443\u0434\u0435\u0442\u0435 \u043f\u043e\u043d\u0438\u043c\u0430\u0442\u044c, \u043f\u043e\u0447\u0435\u043c\u0443 \u0438 \u043a\u0430\u043a \u043e\u043d\u0430 \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442. \u041a\u043d\u0438\u0433\u0430 \u0440\u0430\u0441\u0441\u0447\u0438\u0442\u0430\u043d\u0430 \u043d\u0430 \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u04